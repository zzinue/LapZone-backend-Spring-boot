spring:
  application:
    name: lapzone-api

  datasource:
    url: jdbc:postgresql://localhost:5432/lapzone_db
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
app:
  jwt:
    secret: "lapzone-super-secret-key-para-firmar-tokens-jwt-cambiar-despues"
    expiration-ms: 86400000
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
